<style>
:root{
--bg-light:#f8fafc;
--fg-light:#1e293b;
--primary-light:#2563eb;
--bg-dark:#1e293b;
--fg-dark:#f8fafc;
--primary-dark:#60a5fa;
--radius-card:8px;
--radius-btn:6px;
--spacing:16px;
--margin:24px;
font-family:Inter, system-ui, sans-serif;
}
body{
margin:0;
background:var(--bg-light);
color:var(--fg-light);
transition:background .3s, color .3s;
}
@media (prefers-color-scheme: dark){
body{
background:var(--bg-dark);
color:var(--fg-dark);
}
}
header{
background:var(--primary-light);
color:#fff;
padding:var(--spacing);
}
@media (prefers-color-scheme: dark){
header{
background:var(--primary-dark);
}
}
nav{
display:flex;
flex-wrap:wrap;
gap:var(--spacing);
}
nav a{
color:#fff;
text-decoration:none;
font-weight:600;
padding:var(--spacing) 0;
}
nav a:hover{
opacity:0.8;
}
main{
padding:var(--margin);
max-width:960px;
margin:0 auto;
}
.card{
background:var(--bg-light);
color:var(--fg-light);
border-radius:var(--radius-card);
padding:var(--spacing);
margin-bottom:var(--margin);
box-shadow:0 2px 4px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark){
.card{
background:var(--bg-dark);
color:var(--fg-dark);
}
}
button{
background:var(--primary-light);
color:#fff;
border:none;
border-radius:var(--radius-btn);
padding:var(--spacing);
font-weight:600;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
@media (prefers-color-scheme: dark){
button{
background:var(--primary-dark);
}
}
</style>
