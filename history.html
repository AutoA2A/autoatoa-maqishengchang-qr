<main>
<section>
<h2>历史记录</h2>
  <div style="display:flex;gap:var(--spacing);flex-wrap:wrap;margin-bottom:var(--spacing);">
    <button id="exportCsv" class="btn">导出 CSV</button>
    <button id="cloudSync" class="btn">云同步</button>
  </div>
  <div id="history-list" class="grid"></div>
  <div id="loading" style="text-align:center;color:var(--fg-light);display:none;">加载中…</div>
</section>

<script>
(() => {
  const STORAGE_KEY = 'qrHistory';
  const PAGE_SIZE = 10;
  let records = [];
  let page = 0;
  const listEl = document.getElementById('history-list');
  const loadingEl = document.getElementById('loading');
  const exportBtn = document.getElementById('exportCsv');
  const cloudBtn = document.getElementById('cloudSync');

  function loadRecords() {
    const raw = localStorage.getItem(STORAGE_KEY);
    records = raw ? JSON.parse(raw) : [];
    records.sort((a, b) => b.timestamp - a.timestamp);
    page = 0;
    renderPage();
  }

  function renderPage() {
    const start = page * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const slice = records.slice(start, end);
    if (slice.length === 0 && page === 0) {
      listEl.innerHTML = `<div class="empty"><p>暂无记录</p></div>`;
      loadingEl.style.display = 'none';
      return;
    }
    listEl.innerHTML = '';
    slice.forEach(rec => {
      const card = document.createElement('article');
      card.className = 'card';
      card.style.display = 'flex';
      card.style.gap = var('--spacing');
      card.style.alignItems = 'center';
      card.style.flexWrap = 'wrap';

      // 预览图
      const preview = document.createElement('div');
      preview.style.width = '80px';
      preview.style.height = '80px';
      preview.style.border = '1px solid var(--border)';
      preview.style.background = rec.dataURL ? `url(${rec.dataURL}) center/contain no-repeat` : '#eee';
      card.appendChild(preview);

      // 内容区
      const content = document.createElement('div');
      content.style.flex = '1';
      content.innerHTML = `
        <h3>${rec.content}</h3>
        <p>时间: ${new Date(rec.timestamp).toLocaleString()}</p>
        <p>尺寸: ${rec.size}px</p>
        <p>颜色: ${rec.color}</p>
      `;
      card.appendChild(content);

      // 操作按钮
      const btns = document.createElement('div');
      btns.style.display = 'flex';
      btns.style.gap = var('--spacing');
      btns.style.marginLeft = var('--spacing');

      const editBtn = document.createElement('button');
      editBtn.className = 'btn';
      editBtn.textContent = '编辑';
      editBtn.onclick = () => {
        // 实现编辑逻辑
        alert('编辑功能待实现');
      };
      btns.appendChild(editBtn);

      const downloadBtn = document.createElement('button');
      downloadBtn.className = 'btn';
      downloadBtn.textContent = '下载';
      downloadBtn.onclick = () => {
        // 实现下载逻辑
        const blob = new Blob([`内容:${rec.content}\n时间:${new Date(rec.timestamp)}\n尺寸:${rec.size}px\n颜色:${rec.color}`], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `qr_${rec.id}.txt`;
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
      };
      btns.appendChild(downloadBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn';
      deleteBtn.textContent = '删除';
      deleteBtn.onclick = () => {
        // 实现删除逻辑
        records = records.filter(r => r.id !== rec.id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        renderPage();
      };
      btns.appendChild(deleteBtn);

      card.appendChild(btns);
      listEl.appendChild(card);
    });
    loadingEl.style.display = 'none';
  }

  // 导出CSV
  exportBtn.addEventListener('click', () => {
    const csv = records.map(rec => 
      `${rec.content},${new Date(rec.timestamp)},${rec.size},${rec.color}`
    ).join('\n');
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qr_history.csv';
    document.body.appendChild(a);
    a.click();
    URL.revokeObjectURL(url);
    document.body.removeChild(a);
  });

  // 云同步示例
  cloudBtn.addEventListener('click', () => {
    // 示例：WebDAV或Firebase同步
    alert('云同步功能待实现');
  });

  // 懒加载分页
  window.addEventListener('scroll', () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
      page++;
      renderPage();
    }
  });

  loadRecords();
})();
</script>
