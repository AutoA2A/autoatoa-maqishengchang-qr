--bg-light:#f8fafc;
--fg-light:#1e293b;
--primary-light:#2563eb;
--bg-dark:#1e293b;

--primary-dark:#60a5fa;

--radius-btn:6px;
--spacing:16px;
--margin:24px;

body{

color:var(--fg-light);

}

padding:var(--spacing);
}

}
}
nav{
display:flex;
flex-wrap:wrap;
gap:var(--spacing);
}
nav a{
color:#fff;
text-decoration:none;
font-weight:600;
padding:var(--spacing) 0;
}
nav a:hover{
opacity:0.8;
}
main{
padding:var(--margin);
max-width:960px;
margin:0 auto;
}
.card{
background:var(--bg-light);
color:var(--fg-light);
border-radius:var(--radius-card);
padding:var(--spacing);
margin-bottom:var(--margin);
box-shadow:0 2px 4px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark){
.card{
background:var(--bg-dark);
color:var(--fg-dark);
}
}
button{
background:var(--primary-light);
color:#fff;
border:none;
border-radius:var(--radius-btn);
padding:var(--spacing);
font-weight:600;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
@media (prefers-color-scheme: dark){
button{
background:var(--primary-dark);
}
}
</style>

<main>

<article class="card">
  <h3>全局默认设置</h3>
  <form id="settings-form">
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--spacing-sm);margin-bottom:var(--spacing-sm);">
      <div>
        <label for="default-size" class="block mb-1">默认尺寸 (px)</label>
        <input type="number" id="default-size" name="size" min="64" max="1024" step="1" class="w-full p-2 border rounded" required>
      </div>
      <div>
        <label for="default-color" class="block mb-1">前景颜色</label>
        <input type="color" id="default-color" name="color" class="w-full h-10 p-0 border rounded">
      </div>
      <div>
        <label for="default-bgcolor" class="block mb-1">背景颜色</label>
        <input type="color" id="default-bgcolor" name="bgColor" class="w-full h-10 p-0 border rounded">
      </div>
      <div>
        <label for="default-ecl" class="block mb-1">容错率</label>
        <select id="default-ecl" name="ecl" class="w-full p-2 border rounded">
          <option value="L">L (7%)</option>
          <option value="M">M (15%)</option>
          <option value="Q">Q (25%)</option>
          <option value="H">H (30%)</option>
        </select>
      </div>
      <div>
        <label class="inline-flex items-center mt-2">
          <input type="checkbox" id="auto-save-history" name="autoSave" class="mr-2">
          自动保存历史
        </label>
      </div>
      <div>
        <label for="theme-preference" class="block mb-1">主题偏好</label>
        <select id="theme-preference" name="theme" class="w-full p-2 border rounded">
          <option value="system">跟随系统</option>
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
      </div>
    </div>
    <div class="flex flex-wrap gap-2">
      <button type="submit" class="btn btn-primary">保存设置</button>
      <button type="button" id="reset-defaults" class="btn btn-outline">恢复默认</button>
      <button type="button" id="clear-data" class="btn btn-outline">一键清除本地数据</button>
      <button type="button" id="export-settings" class="btn btn-outline">导出设置</button>
      <label class="btn btn-outline btn-file">
        导入设置
        <input type="file" id="import-file" accept=".json" style="display:none">
      </label>
    </div>
  </form>
</article>

<script>
(() => {
  const defaults = {
    size: 256,
    color: "#000000",
    bgColor: "#ffffff",
    ecl: "M",
    autoSave: true,
    theme: "system"
  };

  const form = document.getElementById('settings-form');
  const importInput = document.getElementById('import-file');

  function loadSettings() {
    const saved = JSON.parse(localStorage.getItem('qrSettings')||'{}');
    const settings = {...defaults, ...saved};
    form.size.value = settings.size;
    form.color.value = settings.color;
    form.bgColor.value = settings.bgColor;
    form.ecl.value = settings.ecl;
    form.autoSave.checked = settings.autoSave;
    form.theme.value = settings.theme;
  }

  function saveSettings() {
    const settings = {
      size: parseInt(form.size.value,10),
      color: form.color.value,
      bgColor: form.bgColor.value,
      ecl: form.ecl.value,
      autoSave: form.autoSave.checked,
      theme: form.theme.value
    };
    localStorage.setItem('qrSettings', JSON.stringify(settings));
    alert('设置已保存');
  }

  function resetDefaults() {
    if(confirm('确定要恢复为默认设置吗？')) {
      localStorage.removeItem('qrSettings');
      loadSettings();
    }
  }

  function clearData() {
    if(confirm('此操作将清除所有本地数据（历史记录、设置等），不可恢复，继续吗？')) {
      localStorage.clear();
      loadSettings();
      alert('本地数据已清除');
    }
  }

  function exportSettings() {
    const data = localStorage.getItem('qrSettings')||JSON.stringify(defaults);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'qr-settings.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importSettings(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const obj = JSON.parse(e.target.result);
        localStorage.setItem('qrSettings', JSON.stringify(obj));
        loadSettings();
        alert('设置已导入');
      } catch(err) {
        alert('导入失败：文件格式不正确');
      }
    };
    reader.readAsText(file);
  }

  form.addEventListener('submit', e=>{e.preventDefault();saveSettings();});
  document.getElementById('reset-defaults').addEventListener('click', resetDefaults);
  document.getElementById('clear-data').addEventListener('click', clearData);
  document.getElementById('export-settings').addEventListener('click', exportSettings);
  importInput.addEventListener('change', e=>{
    if(e.target.files.length) importSettings(e.target.files[0]);
    e.target.value = '';
  });

  // 初始化
  loadSettings();
})();
</script>
