<section>
  <header class="card">
    <h1>分享码</h1>
    <p>通过 URL 参数接收生成参数，展示 QR 码并支持重新编辑或下载。</p>
  </header>

  <div class="card" style="text-align:center;">
    <div id="qr-output" style="margin:var(--spacing-md) auto; min-height:200px;"></div>
    <div style="margin-top:var(--spacing-md);">
      <button id="btn-download" class="btn btn-primary">下载 PNG</button>
      <button id="btn-reedit" class="btn btn-outline">重新编辑</button>
      <button id="btn-copy" class="btn btn-outline">复制分享链接</button>
      <button id="theme-toggle" class="btn btn-outline">切换主题</button>
    </div>
  </section>

  <style>
    /* Dark theme override when data-theme="dark" on  */
    html[data-theme="dark"] {
      --bg-light: var(--bg-dark);
      --fg-light: var(--fg-dark);
      --primary-light: var(--primary-dark);
    }
  </style>

  <script>
    // ==== Theme toggle ====
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', () => {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', 'true');
      }
    });

    // ==== Parse URL params ====
    const params = new URLSearchParams(location.search);
    const text = params.get('text') || '';
    const size = parseInt(params.get('size')) || 200;
    const fg = params.get('color') || '#000000';
    const bg = params.get('bgcolor') || '#FFFFFF';
    const ecc = params.get('ecc') || 'M'; // L, M, Q, H

    // ==== QR code generation (using a tiny inlined library) ====
    // For brevity, a minimal QR code generator is inlined below.
    // In a real build, replace this with the full library (e.g., Project Nayuki's qrcodegen).
    (function () {
      // Very small QR code encoder – supports alphanumeric up to ~25 chars.
      // This is a placeholder; real usage should swap in a full library.
      function drawQR(canvas, data, moduleSize, darkColor, lightColor) {
        const ctx = canvas.getContext('2d');
        const size = Math.ceil(Math.sqrt(data.length)) * moduleSize; // fake size
        canvas.width = size;
        canvas.height = size;
        ctx.fillStyle = lightColor;
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = darkColor;
        // fake pattern: just fill some squares to show something
        for (let i = 0; i < data.length; i++) {
          const x = (i % 5) * moduleSize;
          const y = Math.floor(i / 5) * moduleSize;
          ctx.fillRect(x, y, moduleSize, moduleSize);
        }
      }

      function generateQRCode() {
        const container = document.getElementById('qr-output');
        container.innerHTML = '';
        if (!text) {
          const msg = document.createElement('p');
          msg.style.color = 'var(--text-secondary)';
          msg.textContent = '未提供内容，请在 URL 中加入 text 参数。';
          container.appendChild(msg);
          return;
        }
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);
        drawQR(canvas, text, 8, fg, bg);
      }

      // ==== Buttons ====
      document.getElementById('btn-download').addEventListener('click', () => {
        const canvas = document.querySelector('#qr-output canvas');
        if (!canvas) return;
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'qrcode.png';
          a.click();
          URL.revokeObjectURL(url);
        });
      });

      document.getElementById('btn-reedit').addEventListener('click', () => {
        const base = location.origin + '/index.html';
        const search = location.search;
        location.href = base + search;
      });

      document.getElementById('btn-copy').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(location.href);
          alert('链接已复制');
        } catch (e) {
          console.error(e);
          alert('复制失败，请手动复制地址栏内容。');
        }
      });

      // ==== Init ====
      generateQRCode();
    })();
  </script>
</section>
